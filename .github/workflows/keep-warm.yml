name: Keep backend warm

# O plano gratuito do Render hiberna o serviço após ~15 min sem tráfego, causando
# uma demora grande no próximo acesso (cold start). Este workflow faz um ping leve
# no /healthz/ a cada ~10 min para manter a API acordada.
#
# Observação: o agendador do GitHub Actions pode atrasar alguns minutos e é
# desativado se o repositório ficar 60 dias sem atividade. Para algo mais
# garantido, um pinger externo (UptimeRobot, cron-job.org) também funciona.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS --max-time 60 https://cafe-com-proposito-api.onrender.com/healthz/ \
            && echo "API acordada." \
            || echo "Ping falhou (serviço pode estar iniciando) — sem erro."
