# Infraestrutura como código para o Render.
# Ao conectar o repositório como Blueprint, o Render cria tudo automaticamente.
services:
  - type: web
    name: cafe-com-proposito-api
    # Deploy SEMPRE a partir da main (branch de integração das duas sessões).
    # Sem isto, o Render pode voltar a seguir a branch de uma das sessões e
    # deixar de publicar o que foi mergeado na main. Trava permanente.
    branch: main
    # PLANO: 'free' hiberna após ~15 min sem tráfego (cold start ao acordar).
    # Para produção, troque por 'starter' (~US$7/mês): NÃO hiberna, fica sempre no ar.
    plan: free
    # plan: starter
    runtime: python
    # Monorepo: o backend Django fica em backend/. O Render roda os comandos
    # e resolve build.sh / dados/ a partir desta pasta.
    rootDir: backend
    buildCommand: "./build.sh"
    # Concorrência: threads ajudam porque a carga é I/O-bound (banco remoto).
    # 2 workers x 4 threads (~8 requisições em voo). --max-requests recicla o
    # worker periodicamente para evitar crescimento de memória. Em 512 MB isto é
    # confortável; num plano com mais RAM dá para subir --workers.
    startCommand: "gunicorn cafe_backend.wsgi:application --workers 2 --threads 4 --timeout 60 --max-requests 500 --max-requests-jitter 50"
    # O Render monitora este caminho; se responder 200, o serviço é saudável.
    healthCheckPath: /healthz/
    envVars:
      - key: SECRET_KEY
        generateValue: true            # o Render gera uma chave segura
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.4"
      # Segredo compartilhado com o cron do GitHub Actions que dispara as
      # notificações agendadas. Use o MESMO valor aqui e em GitHub → Secrets.
      - key: CRON_SECRET
        sync: false
      # Login do painel administrativo (a conta da autora).
      # O Render vai te pedir o e-mail e a senha durante a criação.
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

databases:
  - name: cafe-db
    # ⚠️ PLANO: o Postgres 'free' do Render é APAGADO após 90 dias. Para um app
    # publicado, troque por um plano pago (ex.: 'basic-256mb'/'basic-1gb', ~US$7/mês)
    # ANTES de lançar, senão você perde o banco (usuários, anotações, progresso).
    plan: free
    # plan: basic-1gb
    databaseName: cafe
