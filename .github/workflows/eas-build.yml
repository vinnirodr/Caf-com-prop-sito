name: EAS Build (Android APK)

# Dispara o build do APK na nuvem da Expo (EAS), sem precisar do PC.
# Acionável manualmente em Actions → "EAS Build (Android APK)" → Run workflow.
#
# Pré-requisito (uma vez): criar um Access Token em
# https://expo.dev/accounts/[conta]/settings/access-tokens e adicioná-lo como
# secret do repositório chamado EXPO_TOKEN
# (Settings → Secrets and variables → Actions → New repository secret).

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Perfil do eas.json (preview = APK instalável)"
        required: true
        default: "preview"

jobs:
  build:
    name: Build Android (${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      # Cria/linka o projeto Expo na conta do token (1ª vez) — idempotente.
      - name: Ensure EAS project is linked
        run: eas init --non-interactive --force

      - name: Build Android APK
        run: eas build --platform android --profile "${{ github.event.inputs.profile }}" --non-interactive --no-wait
