name: EAS Build (Android APK)

# Dispara o build do APK na nuvem da Expo (EAS), sem precisar do PC.
# Duas formas de acionar:
#   1. Manual: Actions → "EAS Build (Android APK)" → Run workflow.
#   2. Por tag: empurrar uma tag "apk-*" (ex.: git push origin apk-2026-07-06)
#      builda com o profile "preview". Útil para acionar sem o botão Run workflow.
#
# Pré-requisito (uma vez): criar um Access Token em
# https://expo.dev/accounts/[conta]/settings/access-tokens e adicioná-lo como
# secret do repositório chamado EXPO_TOKEN
# (Settings → Secrets and variables → Actions → New repository secret).

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Perfil do eas.json (preview = APK instalável)"
        required: true
        default: "preview"
  push:
    tags:
      - "apk-*"

jobs:
  build:
    name: Build Android (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      # Cria/linka o projeto Expo na conta do token (1ª vez) — idempotente.
      - name: Ensure EAS project is linked
        run: eas init --non-interactive --force

      # Builda na nuvem da Expo, AGUARDA terminar e baixa o .apk.
      - name: Build Android APK (aguarda e baixa)
        run: |
          set -euo pipefail
          eas build --platform android \
            --profile "${{ github.event.inputs.profile || 'preview' }}" \
            --non-interactive --wait --json > build.json
          URL=$(jq -r '.[0].artifacts.applicationArchiveUrl // .[0].artifacts.buildUrl // empty' build.json)
          echo "APK URL: $URL"
          if [ -z "$URL" ]; then echo "::error::Build sem URL de artefato"; cat build.json; exit 1; fi
          curl -fL -o cafe-com-proposito.apk "$URL"
          ls -lh cafe-com-proposito.apk

      # Anexa o APK como artifact do GitHub (baixável direto na página da run).
      - name: Publicar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: cafe-com-proposito-apk
          path: frontend/cafe-com-proposito.apk
          if-no-files-found: error

